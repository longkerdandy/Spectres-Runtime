# Continuous verification — runs the same code-quality checks that
# pre-commit runs locally, but against the full tree using the project
# .venv. Tag pushes intentionally do NOT trigger this workflow; releases
# get their own workflow when the project actually needs one (>= v0.2).
#
# All third-party actions are pinned to specific version tags. Bumps
# arrive via Dependabot once that lands (§8).
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR. Keeps queue short and
# avoids paying for runs whose result is about to be invalidated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege. CI only reads the repository.
permissions:
  contents: read

jobs:
  checks:
    name: lint + type + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Pin uv itself so CI behavior cannot drift between commits.
          version: "0.11.17"
          # Cache is keyed on uv.lock by the action; ~/.cache/uv is reused
          # across runs with the same lockfile.
          enable-cache: true

      - name: Install Python (from .python-version)
        run: uv python install

      - name: Sync dependencies (frozen)
        # --frozen refuses to regenerate uv.lock; if pyproject.toml drifted
        # from uv.lock the job fails loudly here.
        run: uv sync --frozen

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: Mypy — strict type check
        run: uv run mypy

      - name: Pytest — tests + coverage gate
        run: uv run pytest
