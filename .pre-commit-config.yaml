# Pre-commit hooks for Spectres Runtime
# Install with: uv run pre-commit install
# Run manually with: uv run pre-commit run --all-files

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy type check
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
